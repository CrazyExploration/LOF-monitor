name: LOF Arbitrage Daily Check

on:
  workflow_dispatch: # 保持手动触发按钮

  schedule:
    # 国际标准时间 (UTC) = 北京时间 - 8小时
    # 周一至周五运行 (1-5)
    - cron: '10 6 * * 1-5'  # 北京时间 14:10 (即便延迟10分钟，也能在14:20收到)

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Libraries
      run: |
        pip install yfinance pandas requests

    - name: Run Monitor Script
      run: python monitor.py
