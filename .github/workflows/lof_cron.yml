name: LOF Arbitrage Daily Check

on:
  workflow_dispatch: # 保持手动触发按钮

  schedule:
    # 国际标准时间 (UTC) = 北京时间 - 8小时
    # 使用多点排队轰炸法，完美防范 GitHub 延迟造成的收盘错过
    - cron: '30 5 * * 1-5'  # 北京时间 13:30
    - cron: '30 6 * * 1-5'  # 北京时间 14:30

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Libraries
      run: |
        pip install yfinance pandas requests

    - name: Run Monitor Script
      run: python monitor.py
