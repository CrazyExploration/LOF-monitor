name: LOF Arbitrage Daily Check

on:
  schedule:
    # 转换成国际标准时间 (UTC)。北京时间 = UTC + 8 
    # 13:00 -> 05:00 UTC
    # 14:00 -> 06:00 UTC
    # 14:45 -> 06:45 UTC
    # 我们设置在周一至周五的 13:00, 14:00, 14:30, 14:45 触发
    - cron: '0 5,6 * * 1-5'    # 13:00 和 14:00
    - cron: '30,45 6 * * 1-5'  # 14:30 和 14:45

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Libraries
      run: |
        pip install akshare yfinance pandas requests

    - name: Run Monitor Script
      run: python monitor.py
